name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-gcc:
    name: Linux GCC functional
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config
      - name: Build + functional check
        run: make clean && make CC=gcc check
      - name: Install smoke
        run: |
          make install PREFIX=$PWD/stage
          test -f stage/include/awp/awp.h
          test -f stage/lib/libawp.a
          test -f stage/lib/pkgconfig/awp.pc
          pkg-config --with-path=$PWD/stage/lib/pkgconfig --exists awp
          printf '%s\n' '#include "awp/awp.h"' 'static int p(const awp_frame_t *f,void *u){(void)f;(void)u;return 0;}' \
            'int main(void){awp_config_t c;awp_pool_t *pool=0;awp_config_init(&c);c.n_workers=1;c.queue_capacity=8;c.frame_pool_size=16;c.enable_supervisor=0;c.process=p;if(awp_pool_create(&c,&pool)!=0)return 1;awp_pool_shutdown(pool);awp_pool_destroy(pool);return 0;}' \
            > /tmp/awp_consumer.c
          cc -O2 /tmp/awp_consumer.c $(pkg-config --with-path=$PWD/stage/lib/pkgconfig --cflags --libs awp) -o /tmp/awp_consumer
          /tmp/awp_consumer

  linux-asan:
    name: Linux ASan+UBSan (split LSan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Sanitizer suite (clean LSan on; quarantine LSan off)
        run: make clean && make CC=gcc check-sanitize
